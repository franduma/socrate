services:
  neo4j:
    image: neo4j:5.26
    container_name: socrate-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH}
      - NEO4J_server_memory_heap_initial__size=${NEO4J_HEAP_INITIAL}
      - NEO4J_server_memory_heap_max__size=${NEO4J_HEAP_MAX}
      - NEO4J_server_memory_pagecache_size=${NEO4J_PAGECACHE}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  chroma:
    image: chromadb/chroma:0.5.5
    container_name: socrate-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  neo4j_data:
  neo4j_logs:
  chroma_data:
